<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-teal-400 via-blue-500 to-indigo-600 flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white/10 backdrop-blur-lg rounded-2xl shadow-2xl overflow-hidden border border-white/20">
        <div class="p-8">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-white mb-2">Create Account</h2>
                <p class="text-white/80 text-sm">Join us and start your journey</p>
            </div>
            
            <form th:action="@{/register}" th:object="${request}" method="post" class="space-y-5">
                <div>
                    <label class="block text-white/90 text-sm font-medium mb-1.5" for="username">Username</label>
                    <input type="text" th:field="*{username}" id="username" 
                           class="w-full px-4 py-2.5 rounded-xl bg-white/5 border border-white/10 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-white/50 focus:border-transparent transition-all duration-300"
                           placeholder="Choose a username" required>
                </div>
                
                <div>
                    <label class="block text-white/90 text-sm font-medium mb-1.5" for="password">Password</label>
                    <input type="password" th:field="*{password}" id="password"
                           class="w-full px-4 py-2.5 rounded-xl bg-white/5 border border-white/10 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-white/50 focus:border-transparent transition-all duration-300"
                           placeholder="Create a password" required>
                </div>

                <div>
                    <label class="block text-white/90 text-sm font-medium mb-1.5" for="nama">Full Name</label>
                    <input type="text" th:field="*{nama}" id="nama"
                           class="w-full px-4 py-2.5 rounded-xl bg-white/5 border border-white/10 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-white/50 focus:border-transparent transition-all duration-300"
                           placeholder="Enter your full name" required>
                </div>

                <div>
                    <label class="block text-white/90 text-sm font-medium mb-1.5" for="alamat">Address</label>
                    <input type="text" th:field="*{alamat}" id="alamat"
                           class="w-full px-4 py-2.5 rounded-xl bg-white/5 border border-white/10 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-white/50 focus:border-transparent transition-all duration-300"
                           placeholder="Enter your address" required>
                </div>
                
                <button type="submit" 
                        class="w-full py-3 px-4 mt-2 bg-white text-indigo-600 font-semibold rounded-xl shadow-lg hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-white/50 focus:ring-offset-2 focus:ring-offset-indigo-500 transform hover:-translate-y-0.5 transition-all duration-300">
                    Register Now
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <p class="text-white/80 text-sm">
                    Sudah punya akun? 
                    <a th:href="@{/login}" class="text-white font-semibold hover:underline decoration-2 underline-offset-4 transition-all">Login disini</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
