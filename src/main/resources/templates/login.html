<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white/10 backdrop-blur-lg rounded-2xl shadow-2xl overflow-hidden border border-white/20">
        <div class="p-8">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-white mb-2">Welcome Back</h2>
                <p class="text-white/80 text-sm">Please sign in to your account</p>
            </div>
            
            <form th:action="@{/login}" method="post" class="space-y-6">
                <div>
                    <label class="block text-white/90 text-sm font-medium mb-2" for="username">Username</label>
                    <input type="text" name="username" id="username" 
                           class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-white/50 focus:border-transparent transition-all duration-300"
                           placeholder="Enter your username" required>
                </div>
                
                <div>
                    <label class="block text-white/90 text-sm font-medium mb-2" for="password">Password</label>
                    <input type="password" name="password" id="password"
                           class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-white/50 focus:border-transparent transition-all duration-300"
                           placeholder="Enter your password" required>
                </div>
                
                <button type="submit" 
                        class="w-full py-3 px-4 bg-white text-purple-600 font-semibold rounded-xl shadow-lg hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-white/50 focus:ring-offset-2 focus:ring-offset-purple-500 transform hover:-translate-y-0.5 transition-all duration-300">
                    Sign In
                </button>
            </form>
            
            <div class="mt-8 text-center">
                <p class="text-white/80 text-sm">
                    Belum punya akun? 
                    <a th:href="@{/register}" class="text-white font-semibold hover:underline decoration-2 underline-offset-4 transition-all">Register disini</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
